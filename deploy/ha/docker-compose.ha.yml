services:
  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${HA_JAEGER_UI_PORT:-16687}:16686"
      - "${HA_JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${HA_JAEGER_OTLP_HTTP_PORT:-14318}:4318"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "dagens"
    ports:
      - "${HA_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${HA_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    environment:
      ETCD_NAME: etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: dagens-local-ha
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-server:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      DEV_MODE: "true"
      ETCD_ENDPOINTS: "http://etcd:2379"
      CONTROL_PLANE_ID: "api-a"
      POD_IP: "api-server"
      SCHEDULER_LEADER_FORWARD_URLS: "api-a=http://api-server:8080,api-b=http://api-server-b:8080"
      SCHEDULER_LEADERSHIP_BACKEND: "etcd"
      SCHEDULER_LEADERSHIP_KEY: "/dagens/control-plane/scheduler"
      SCHEDULER_LEADERSHIP_TTL_SECONDS: "10"
      SCHEDULER_LEADERSHIP_DIAL_TIMEOUT: "5s"
      SCHEDULER_TRANSITION_STORE: "postgres"
      SCHEDULER_TRANSITION_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      SCHEDULER_JOB_QUEUE_SIZE: "${HA_SCHEDULER_JOB_QUEUE_SIZE:-100}"
      SCHEDULER_DEFAULT_WORKER_MAX_CONCURRENCY: "${HA_SCHEDULER_DEFAULT_WORKER_MAX_CONCURRENCY:-1}"
      SCHEDULER_CAPACITY_TTL: "${HA_SCHEDULER_CAPACITY_TTL:-5s}"
      SCHEDULER_DISPATCH_REJECT_COOLDOWN: "${HA_SCHEDULER_DISPATCH_REJECT_COOLDOWN:-5s}"
      SCHEDULER_ENABLE_STAGE_CAPACITY_DEFERRAL: "${HA_SCHEDULER_ENABLE_STAGE_CAPACITY_DEFERRAL:-false}"
      SCHEDULER_STAGE_CAPACITY_DEFERRAL_TIMEOUT: "${HA_SCHEDULER_STAGE_CAPACITY_DEFERRAL_TIMEOUT:-2s}"
      SCHEDULER_STAGE_CAPACITY_DEFERRAL_POLL_INTERVAL: "${HA_SCHEDULER_STAGE_CAPACITY_DEFERRAL_POLL_INTERVAL:-100ms}"
      HITL_CALLBACK_ENABLED: "true"
      HITL_DRILL_ENABLED: "true"
      HITL_CALLBACK_SECRET: "ha-hitl-drill-secret"
      HITL_REDIS_ADDR: "redis:6379"
      HITL_CHECKPOINT_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      HITL_RESUMPTION_WORKERS: "1"
      BASE_CALLBACK_URL: "${BASE_CALLBACK_URL:-http://localhost:18083}"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-api-a"
    ports:
      - "${HA_API_A_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  api-server-b:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      DEV_MODE: "true"
      ETCD_ENDPOINTS: "http://etcd:2379"
      CONTROL_PLANE_ID: "api-b"
      POD_IP: "api-server-b"
      SCHEDULER_LEADER_FORWARD_URLS: "api-a=http://api-server:8080,api-b=http://api-server-b:8080"
      SCHEDULER_LEADERSHIP_BACKEND: "etcd"
      SCHEDULER_LEADERSHIP_KEY: "/dagens/control-plane/scheduler"
      SCHEDULER_LEADERSHIP_TTL_SECONDS: "10"
      SCHEDULER_LEADERSHIP_DIAL_TIMEOUT: "5s"
      SCHEDULER_TRANSITION_STORE: "postgres"
      SCHEDULER_TRANSITION_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      SCHEDULER_JOB_QUEUE_SIZE: "${HA_SCHEDULER_JOB_QUEUE_SIZE:-100}"
      SCHEDULER_DEFAULT_WORKER_MAX_CONCURRENCY: "${HA_SCHEDULER_DEFAULT_WORKER_MAX_CONCURRENCY:-1}"
      SCHEDULER_CAPACITY_TTL: "${HA_SCHEDULER_CAPACITY_TTL:-5s}"
      SCHEDULER_DISPATCH_REJECT_COOLDOWN: "${HA_SCHEDULER_DISPATCH_REJECT_COOLDOWN:-5s}"
      SCHEDULER_ENABLE_STAGE_CAPACITY_DEFERRAL: "${HA_SCHEDULER_ENABLE_STAGE_CAPACITY_DEFERRAL:-false}"
      SCHEDULER_STAGE_CAPACITY_DEFERRAL_TIMEOUT: "${HA_SCHEDULER_STAGE_CAPACITY_DEFERRAL_TIMEOUT:-2s}"
      SCHEDULER_STAGE_CAPACITY_DEFERRAL_POLL_INTERVAL: "${HA_SCHEDULER_STAGE_CAPACITY_DEFERRAL_POLL_INTERVAL:-100ms}"
      HITL_CALLBACK_ENABLED: "true"
      HITL_DRILL_ENABLED: "true"
      HITL_CALLBACK_SECRET: "ha-hitl-drill-secret"
      HITL_REDIS_ADDR: "redis:6379"
      HITL_CHECKPOINT_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      HITL_RESUMPTION_WORKERS: "1"
      BASE_CALLBACK_URL: "${BASE_CALLBACK_URL:-http://localhost:18083}"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-api-b"
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${HA_API_B_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-lb:
    image: nginx:1.27-alpine
    depends_on:
      api-server:
        condition: service_healthy
      api-server-b:
        condition: service_healthy
    ports:
      - "${HA_API_LB_PORT:-18083}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker-1:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      NODE_ID: "worker-1"
      PORT: "50051"
      POD_IP: "worker-1"
      ETCD_ENDPOINTS: "http://etcd:2379"
      API_SERVER_URL: "http://api-lb:8080"
      API_SERVER_FALLBACK_URLS: "http://api-server:8080,http://api-server-b:8080"
      WORKER_MAX_CONCURRENCY: "${HA_WORKER_MAX_CONCURRENCY:-1}"
      WORKER_HEARTBEAT_INTERVAL_SECONDS: "${HA_WORKER_HEARTBEAT_INTERVAL_SECONDS:-2}"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-worker"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
    depends_on:
      etcd:
        condition: service_healthy
      jaeger:
        condition: service_started
      api-lb:
        condition: service_healthy

  worker-2:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      NODE_ID: "worker-2"
      PORT: "50051"
      POD_IP: "worker-2"
      ETCD_ENDPOINTS: "http://etcd:2379"
      API_SERVER_URL: "http://api-lb:8080"
      API_SERVER_FALLBACK_URLS: "http://api-server:8080,http://api-server-b:8080"
      WORKER_MAX_CONCURRENCY: "${HA_WORKER_MAX_CONCURRENCY:-1}"
      WORKER_HEARTBEAT_INTERVAL_SECONDS: "${HA_WORKER_HEARTBEAT_INTERVAL_SECONDS:-2}"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-worker"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
    depends_on:
      etcd:
        condition: service_healthy
      jaeger:
        condition: service_started
      api-lb:
        condition: service_healthy
