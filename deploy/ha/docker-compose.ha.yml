services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16687:16686"
      - "14317:4317"
      - "14318:4318"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "dagens"
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    environment:
      ETCD_NAME: etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: dagens-local-ha
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-server:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      DEV_MODE: "true"
      ETCD_ENDPOINTS: "http://etcd:2379"
      CONTROL_PLANE_ID: "api-a"
      POD_IP: "api-server"
      SCHEDULER_LEADERSHIP_BACKEND: "etcd"
      SCHEDULER_LEADERSHIP_KEY: "/dagens/control-plane/scheduler"
      SCHEDULER_LEADERSHIP_TTL_SECONDS: "10"
      SCHEDULER_LEADERSHIP_DIAL_TIMEOUT: "5s"
      SCHEDULER_TRANSITION_STORE: "postgres"
      SCHEDULER_TRANSITION_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-api-a"
    ports:
      - "18081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

  api-server-b:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      DEV_MODE: "true"
      ETCD_ENDPOINTS: "http://etcd:2379"
      CONTROL_PLANE_ID: "api-b"
      POD_IP: "api-server-b"
      SCHEDULER_LEADERSHIP_BACKEND: "etcd"
      SCHEDULER_LEADERSHIP_KEY: "/dagens/control-plane/scheduler"
      SCHEDULER_LEADERSHIP_TTL_SECONDS: "10"
      SCHEDULER_LEADERSHIP_DIAL_TIMEOUT: "5s"
      SCHEDULER_TRANSITION_STORE: "postgres"
      SCHEDULER_TRANSITION_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-api-b"
    depends_on:
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-lb:
    image: nginx:1.27-alpine
    depends_on:
      api-server:
        condition: service_healthy
      api-server-b:
        condition: service_healthy
    ports:
      - "18083:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker-1:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      NODE_ID: "worker-1"
      PORT: "50051"
      POD_IP: "worker-1"
      ETCD_ENDPOINTS: "http://etcd:2379"
      API_SERVER_URL: "http://api-lb:8080"
      API_SERVER_FALLBACK_URLS: "http://api-server:8080,http://api-server-b:8080"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-worker"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
    depends_on:
      etcd:
        condition: service_healthy
      jaeger:
        condition: service_started
      api-lb:
        condition: service_healthy

  worker-2:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      NODE_ID: "worker-2"
      PORT: "50051"
      POD_IP: "worker-2"
      ETCD_ENDPOINTS: "http://etcd:2379"
      API_SERVER_URL: "http://api-lb:8080"
      API_SERVER_FALLBACK_URLS: "http://api-server:8080,http://api-server-b:8080"
      OTEL_EXPORTER_TYPE: "otlp"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      OTEL_SERVICE_NAME: "dagens-worker"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
    depends_on:
      etcd:
        condition: service_healthy
      jaeger:
        condition: service_started
      api-lb:
        condition: service_healthy
