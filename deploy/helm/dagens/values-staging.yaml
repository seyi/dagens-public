# Staging overrides for Dagens
replicaCount: 2
image:
  tag: "staging"
ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
autoscaling:
  enabled: true
serviceMonitor:
  enabled: true
networkPolicy:
  enabled: true
