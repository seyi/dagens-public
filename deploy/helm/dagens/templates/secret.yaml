{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "dagens.fullname" . }}-secret
  labels:
    {{- include "dagens.labels" . | nindent 4 }}
stringData:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
