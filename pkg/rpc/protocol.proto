// Protocol buffers for distributed AI agent communication
// Inspired by Spark's RPC protocol
syntax = "proto3";

package rpc;

option go_package = "github.com/apache/spark/spark-ai-agents/pkg/rpc";

// AgentService provides distributed agent execution
service AgentService {
  // RegisterExecutor registers a new executor with the scheduler
  rpc RegisterExecutor(RegisterExecutorRequest) returns (RegisterExecutorResponse);

  // LaunchTask launches a task on an executor
  rpc LaunchTask(LaunchTaskRequest) returns (LaunchTaskResponse);

  // TaskStatusUpdate reports task status back to scheduler
  rpc TaskStatusUpdate(TaskStatusUpdateRequest) returns (TaskStatusUpdateResponse);

  // Heartbeat sends periodic health signals
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // SubmitJob submits a new agent job
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);

  // GetJobStatus retrieves job execution status
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);

  // KillTask terminates a running task
  rpc KillTask(KillTaskRequest) returns (KillTaskResponse);
}

// RegisterExecutorRequest registers an executor
message RegisterExecutorRequest {
  string executor_id = 1;
  string partition = 2;
  string node = 3;
  string rack = 4;
  int32 max_tasks = 5;
  map<string, string> metadata = 6;
}

message RegisterExecutorResponse {
  bool success = 1;
  string message = 2;
}

// LaunchTaskRequest launches a task on executor
message LaunchTaskRequest {
  string task_id = 1;
  string job_id = 2;
  string agent_id = 3;
  AgentInputProto input = 4;
  int32 stage = 5;
  int32 attempt = 6;
  string preferred_location = 7;
}

message LaunchTaskResponse {
  bool success = 1;
  string message = 2;
}

// AgentInputProto represents agent input
message AgentInputProto {
  string task_id = 1;
  string instruction = 2;
  map<string, bytes> context = 3;
  repeated ToolProto tools = 4;
  string model = 5;
  int32 max_retries = 6;
  int64 timeout_ms = 7;
}

// ToolProto represents an agent tool
message ToolProto {
  string name = 1;
  string description = 2;
  bytes schema = 3;
}

// TaskStatusUpdateRequest reports task status
message TaskStatusUpdateRequest {
  string executor_id = 1;
  string task_id = 2;
  string job_id = 3;
  TaskState state = 4;
  AgentOutputProto output = 5;
  string error = 6;
  int64 timestamp = 7;
}

message TaskStatusUpdateResponse {
  bool ack = 1;
}

// TaskState represents task execution state
enum TaskState {
  PENDING = 0;
  SCHEDULED = 1;
  RUNNING = 2;
  COMPLETED = 3;
  FAILED = 4;
  RETRYING = 5;
}

// AgentOutputProto represents agent output
message AgentOutputProto {
  string task_id = 1;
  bytes result = 2;
  map<string, bytes> metadata = 3;
  repeated ExecutionStepProto execution_log = 4;
  ExecutionMetricsProto metrics = 5;
}

// ExecutionStepProto tracks execution steps
message ExecutionStepProto {
  string step_id = 1;
  int64 timestamp = 2;
  string action = 3;
  bytes input = 4;
  bytes output = 5;
  int64 duration_ms = 6;
}

// ExecutionMetricsProto tracks execution metrics
message ExecutionMetricsProto {
  int64 start_time = 1;
  int64 end_time = 2;
  int64 duration_ms = 3;
  int32 tool_call_count = 4;
  int32 tokens_used = 5;
  int32 retry_count = 6;
  int32 partition_hits = 7;
}

// HeartbeatRequest sends health signal
message HeartbeatRequest {
  string executor_id = 1;
  ExecutorMetricsProto metrics = 2;
  int64 timestamp = 3;
}

message HeartbeatResponse {
  bool ack = 1;
  repeated string tasks_to_kill = 2;
}

// ExecutorMetricsProto holds executor metrics
message ExecutorMetricsProto {
  int32 tasks_executed = 1;
  int32 tasks_failed = 2;
  int64 total_duration_ms = 3;
  int64 avg_duration_ms = 4;
  int64 memory_used = 5;
  double cpu_usage = 6;
}

// SubmitJobRequest submits a new job
message SubmitJobRequest {
  AgentDefinitionProto agent = 1;
  AgentInputProto input = 2;
}

message SubmitJobResponse {
  string job_id = 1;
  bool success = 2;
  string message = 3;
}

// AgentDefinitionProto defines an agent
message AgentDefinitionProto {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string capabilities = 4;
  repeated AgentDefinitionProto dependencies = 5;
  string partition = 6;
}

// GetJobStatusRequest retrieves job status
message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  string job_id = 1;
  JobState state = 2;
  int32 total_stages = 3;
  int32 completed_stages = 4;
  int32 total_tasks = 5;
  int32 completed_tasks = 6;
  int64 start_time = 7;
  int64 end_time = 8;
  string error = 9;
}

// JobState represents job execution state
enum JobState {
  JOB_PENDING = 0;
  JOB_RUNNING = 1;
  JOB_COMPLETED = 2;
  JOB_FAILED = 3;
}

// KillTaskRequest terminates a task
message KillTaskRequest {
  string task_id = 1;
  string reason = 2;
}

message KillTaskResponse {
  bool success = 1;
  string message = 2;
}
