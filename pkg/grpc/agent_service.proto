syntax = "proto3";

package spark_ai_agents;

option go_package = "github.com/apache/spark/spark-ai-agents/pkg/grpc;grpc";

// AgentService provides gRPC API for agent execution
service AgentService {
    // Execute single agent request
    rpc Execute(AgentRequest) returns (AgentResponse);

    // Execute batch of requests with streaming
    rpc BatchExecute(stream AgentRequest) returns (stream AgentResponse);

    // Health check
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

    // List available agents
    rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
}

// AgentRequest represents a single agent execution request
message AgentRequest {
    string agent_id = 1;
    string input = 2;
    map<string, string> context = 3;
    string session_id = 4;
    string user_id = 5;
}

// AgentResponse represents the result of agent execution
message AgentResponse {
    string output = 1;
    map<string, string> metadata = 2;
    repeated Event events = 3;
    bool success = 4;
    string error = 5;
    int64 duration_ms = 6;
}

// Event represents a runtime event
message Event {
    string type = 1;
    string content = 2;
    int64 timestamp = 3;
    string author = 4;
}

// HealthCheckRequest for service health checks
message HealthCheckRequest {
    string service = 1;
}

// HealthCheckResponse with service status
message HealthCheckResponse {
    enum ServingStatus {
        UNKNOWN = 0;
        SERVING = 1;
        NOT_SERVING = 2;
    }
    ServingStatus status = 1;
}

// ListAgentsRequest to get available agents
message ListAgentsRequest {}

// ListAgentsResponse with agent information
message ListAgentsResponse {
    repeated AgentInfo agents = 1;
}

// AgentInfo describes an agent
message AgentInfo {
    string id = 1;
    string name = 2;
    string description = 3;
    string type = 4;
}
