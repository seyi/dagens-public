version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dagens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - DEV_MODE=true
      - SCHEDULER_TRANSITION_STORE=postgres
      - SCHEDULER_TRANSITION_POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/dagens?sslmode=disable
      - OTEL_EXPORTER_TYPE=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_SERVICE_NAME=dagens-api
    ports:
      - "8080:8080"
    depends_on:
      - jaeger
      - postgres

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ID=worker-1
      - PORT=50051
      - OTEL_EXPORTER_TYPE=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_SERVICE_NAME=dagens-worker
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - jaeger

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ID=worker-2
      - PORT=50051
      - OTEL_EXPORTER_TYPE=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_SERVICE_NAME=dagens-worker
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - jaeger
