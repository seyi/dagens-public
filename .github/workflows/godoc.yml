name: Deploy GoDoc to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'

      - name: Install godoc
        run: go install golang.org/x/tools/cmd/godoc@latest

      - name: Generate docs
        run: |
          godoc -http=:6060 &
          sleep 2
          set +e
          wget -e robots=off -r -np -N -E -p -k http://localhost:6060/pkg/github.com/seyi/dagens/
          wget_status=$?
          set -e
          if [ "${wget_status}" -ne 0 ] && [ "${wget_status}" -ne 8 ]; then
            exit "${wget_status}"
          fi
          kill $!
          mv localhost:6060 docs
          touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
