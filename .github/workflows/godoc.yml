name: Deploy GoDoc to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'

      - name: Install godoc
        run: go install golang.org/x/tools/cmd/godoc@latest

      - name: Generate docs
        run: |
          set -euo pipefail
          godoc -http=:6060 >godoc.log 2>&1 &
          godoc_pid=$!
          trap 'kill ${godoc_pid} 2>/dev/null || true' EXIT
          deadline=$(( $(date +%s) + 30 ))
          until curl -fsS http://127.0.0.1:6060/ >/dev/null; do
            if ! kill -0 "${godoc_pid}" 2>/dev/null; then
              cat godoc.log
              exit 1
            fi
            if [[ $(date +%s) -ge ${deadline} ]]; then
              cat godoc.log
              exit 1
            fi
            sleep 1
          done
          set +e
          wget -e robots=off -r -np -N -E -p -k http://127.0.0.1:6060/pkg/github.com/seyi/dagens/
          wget_status=$?
          set -e
          if [ "${wget_status}" -ne 0 ] && [ "${wget_status}" -ne 8 ]; then
            cat godoc.log
            exit "${wget_status}"
          fi
          kill "${godoc_pid}"
          wait "${godoc_pid}" || true
          trap - EXIT
          mv 127.0.0.1:6060 docs
          touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
