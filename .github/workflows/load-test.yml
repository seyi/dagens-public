# Load Tests - Run nightly and on-demand
name: Load Tests

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      vus:
        description: 'Number of virtual users'
        required: false
        default: '10'
        type: choice
        options:
          - '10'
          - '50'
          - '100'
      duration:
        description: 'Test duration'
        required: false
        default: '2m'
        type: string
      scenario:
        description: 'Test scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'execute'
          - 'batch'
          - 'health'

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        vus: [10, 50, 100]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build agent-server
        run: go build -o agent-server ./cmd/agent-server

      - name: Start agent-server
        run: |
          ./agent-server -addr :8080 &
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/health | grep -q healthy; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run execute scenario
        run: |
          VUS=${{ matrix.vus }} DURATION=2m BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-execute-${{ matrix.vus }}vus.json \
            tests/load/k6/execute_scenario.js

      - name: Run batch scenario
        run: |
          VUS=${{ matrix.vus }} DURATION=2m BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-batch-${{ matrix.vus }}vus.json \
            tests/load/k6/batch_scenario.js

      - name: Run health scenario
        run: |
          VUS=${{ matrix.vus }} DURATION=1m BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-health-${{ matrix.vus }}vus.json \
            tests/load/k6/health_scenario.js

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ matrix.vus }}vus
          path: results-*.json
          retention-days: 30

      - name: Stop agent-server
        if: always()
        run: pkill agent-server || true

  load-test-manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build agent-server
        run: go build -o agent-server ./cmd/agent-server

      - name: Start agent-server
        run: |
          ./agent-server -addr :8080 &
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/health | grep -q healthy; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run execute scenario
        if: github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'execute'
        run: |
          VUS=${{ github.event.inputs.vus }} DURATION=${{ github.event.inputs.duration }} BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-execute.json \
            tests/load/k6/execute_scenario.js

      - name: Run batch scenario
        if: github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'batch'
        run: |
          VUS=${{ github.event.inputs.vus }} DURATION=${{ github.event.inputs.duration }} BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-batch.json \
            tests/load/k6/batch_scenario.js

      - name: Run health scenario
        if: github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'health'
        run: |
          VUS=${{ github.event.inputs.vus }} DURATION=${{ github.event.inputs.duration }} BASE_URL=http://127.0.0.1:8080 \
            k6 run --summary-export results-health.json \
            tests/load/k6/health_scenario.js

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-manual
          path: results-*.json
          retention-days: 30

      - name: Stop agent-server
        if: always()
        run: pkill agent-server || true
