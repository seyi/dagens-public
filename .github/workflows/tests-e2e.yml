# E2E Tests - Run on every PR and push to main
name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build agent-server binary
        run: go build -o agent-server ./cmd/agent-server

      - name: Run E2E tests
        run: |
          go test ./tests/e2e/... -v -timeout 5m
        env:
          AGENT_SERVER_BINARY: ./agent-server

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            tests/e2e/*.log
          retention-days: 7

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -short -timeout 2m

      - name: Run tests with race detector
        run: go test ./... -race -short -timeout 3m
        env:
          GOFLAGS: -buildvcs=false

  scheduler-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run scheduler integration tests
        run: go test -tags=integration ./pkg/scheduler -v -timeout 15m

  scheduler-ha-failover-repeatability:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start HA stack
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml up -d --build

      - name: Wait for HA endpoint readiness
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 240 ))
          until curl -fsS http://localhost:18083/health >/dev/null; do
            if [[ $(date +%s) -ge ${deadline} ]]; then
              echo "HA LB healthcheck timed out"
              exit 1
            fi
            sleep 3
          done

      - name: Run repeated failover drill gate
        run: |
          set -euo pipefail
          mkdir -p artifacts
          API_URL="http://localhost:18083" \
          DRILL_TIMEOUT_SECONDS=180 \
          DATABASE_URL="postgres://postgres:postgres@localhost:55432/dagens?sslmode=disable" \
          EVIDENCE_ROOT="artifacts/repeat-failover" \
          ./scripts/repeat_failover_drill.sh | tee artifacts/repeat-failover.log

      - name: Capture HA diagnostics
        if: always()
        run: |
          set +e
          mkdir -p artifacts
          docker compose -f deploy/ha/docker-compose.ha.yml ps > artifacts/compose-ps.txt
          docker compose -f deploy/ha/docker-compose.ha.yml logs --no-color > artifacts/compose-logs.txt
          curl -sS http://localhost:18083/health > artifacts/lb-health.json

      - name: Upload failover drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-ha-failover-repeatability-artifacts
          path: artifacts/
          retention-days: 7

      - name: Teardown HA stack
        if: always()
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml down -v

  scheduler-ha-chaos-load-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start HA stack
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml up -d --build

      - name: Wait for HA endpoint readiness
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 240 ))
          until curl -fsS http://localhost:18083/health >/dev/null; do
            if [[ $(date +%s) -ge ${deadline} ]]; then
              echo "HA LB healthcheck timed out"
              exit 1
            fi
            sleep 3
          done

      - name: Run chaos/load suite
        run: |
          set -euo pipefail
          mkdir -p artifacts
          API_URL="http://localhost:18083" \
          DRILL_TIMEOUT_SECONDS=180 \
          DATABASE_URL="postgres://postgres:postgres@localhost:55432/dagens?sslmode=disable" \
          EVIDENCE_ROOT="artifacts/chaos-load-suite" \
          ./scripts/chaos_load_suite.sh | tee artifacts/chaos-load-suite.log

      - name: Capture HA diagnostics
        if: always()
        run: |
          set +e
          mkdir -p artifacts
          docker compose -f deploy/ha/docker-compose.ha.yml ps > artifacts/compose-ps.txt
          docker compose -f deploy/ha/docker-compose.ha.yml logs --no-color > artifacts/compose-logs.txt
          curl -sS http://localhost:18083/health > artifacts/lb-health.json

      - name: Upload chaos/load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-ha-chaos-load-suite-artifacts
          path: artifacts/
          retention-days: 7

      - name: Teardown HA stack
        if: always()
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml down -v

  scheduler-ha-failback-chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start HA stack
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml up -d --build

      - name: Wait for HA endpoint readiness
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 240 ))
          until curl -fsS http://localhost:18083/health >/dev/null; do
            if [[ $(date +%s) -ge ${deadline} ]]; then
              echo "HA LB healthcheck timed out"
              exit 1
            fi
            sleep 3
          done
          until curl -fsS http://localhost:18081/health >/dev/null; do
            if [[ $(date +%s) -ge ${deadline} ]]; then
              echo "HA api-a healthcheck timed out"
              exit 1
            fi
            sleep 3
          done
          until curl -fsS http://localhost:18082/health >/dev/null; do
            if [[ $(date +%s) -ge ${deadline} ]]; then
              echo "HA api-b healthcheck timed out"
              exit 1
            fi
            sleep 3
          done

      - name: Run failback chaos reclaim drill
        run: |
          set -euo pipefail
          mkdir -p artifacts
          API_URL="http://localhost:18083" \
          API_A_URL="http://localhost:18081" \
          API_B_URL="http://localhost:18082" \
          DRILL_TIMEOUT_SECONDS=180 \
          DATABASE_URL="postgres://postgres:postgres@localhost:55432/dagens?sslmode=disable" \
          EVIDENCE_ROOT="artifacts/failback-chaos" \
          ./scripts/failback_chaos_drill.sh | tee artifacts/failback-chaos.log

      - name: Capture HA diagnostics
        if: always()
        run: |
          set +e
          mkdir -p artifacts
          docker compose -f deploy/ha/docker-compose.ha.yml ps > artifacts/compose-ps.txt
          docker compose -f deploy/ha/docker-compose.ha.yml logs --no-color > artifacts/compose-logs.txt
          curl -sS http://localhost:18083/health > artifacts/lb-health.json
          curl -sS http://localhost:18081/health > artifacts/api-a-health.json
          curl -sS http://localhost:18082/health > artifacts/api-b-health.json

      - name: Upload failback chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-ha-failback-chaos-artifacts
          path: artifacts/
          retention-days: 7

      - name: Teardown HA stack
        if: always()
        run: |
          docker compose -f deploy/ha/docker-compose.ha.yml down -v
